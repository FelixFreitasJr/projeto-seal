<!DOCTYPE html>
<html>
<head>
  <title>Consulta Estoque</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <div class="titulo">
    <strong>SEAL — Serviço de Almoxarifado</strong><br>
    <small>Localizador de Estoque</small>
  </div>
</div>

<!-- BUSCA -->
<div class="busca-container">
  <input type="text" id="busca" placeholder="Pesquisar por código, nome ou endereço">
  <button id="btnBuscar">Buscar</button>
</div>

<div class="info">
  <span id="totalItens">0 itens encontrados</span>
</div>

<!-- TABELA -->
<table>
  <thead>
    <tr>
      <th>Código</th>
      <th>Nome</th>
      <th>Externo</th>
      <th>Satélite</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script type="module" src="js/app.js"></script>

</body>
</html>
