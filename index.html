<!DOCTYPE html>
<html>
<head>
  <title>SEAL - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="js/auth.js"></script>
</head>

<body>

<!-- TOPO -->
<div class="topo">

  <div class="topo-esquerda">
    <img src="img/logo.png" class="logo">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Painel de Controle</small>
    </div>
  </div>

  <div class="topo-direita">
    <span id="usuario"></span>

    <button onclick="ir('index.html')">Dashboard</button>
    <button onclick="ir('pages/estoque.html')">Estoque</button>
    <button onclick="ir('pages/dispensa.html')">Dispensa</button>

    <button onclick="logout()">Sair</button>
  </div>

</div>

<!-- CONTEÚDO -->
<div class="conteudo">
  <h1>Dashboard</h1>

  <p id="userInfo"></p>

  <p>Bem-vindo ao sistema SEAL.</p>
  <p>Use o menu acima para navegar.</p>
</div>

<!-- RODAPÉ -->
<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<!-- SCRIPTS -->
<script>
  checkAuth();

  function ir(pagina){
    window.location.href = pagina;
  }

  document.getElementById("usuario").innerText =
    "Usuário: " + getUser();

  document.getElementById("userInfo").innerText =
    "Usuário logado: " + getUser();
</script>

</body>
</html>
