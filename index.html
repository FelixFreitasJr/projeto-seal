<!DOCTYPE html>
<html>
<head>
  <title>SEAL - Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/auth.js"></script>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="topo-esquerda">
    <img src="img/logo.png" class="logo">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Painel de Controle</small>
    </div>
  </div>

  <div class="topo-direita">
    <button onclick="window.location.href='index.html'">Dashboard</button>
    <button onclick="window.location.href='pages/estoque.html'">Estoque</button>
    <button onclick="window.location.href='pages/dispensa.html'">Dispensa</button>
    <button id="btnConfig" class="hidden">⚙️</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">
  <h1>Dashboard</h1>
  <p id="userInfo"></p>
  <p>Bem-vindo ao sistema SEAL.</p>
  <p>Use o menu acima para navegar.</p>
</div>

<!-- MODAL CONFIGURAÇÃO -->
<div id="modalConfig" class="modal hidden">
  <div class="modal-content">
    <h3>Gerenciar Usuários</h3>
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios"></tbody>
    </table>
    <div class="modal-actions">
      <button id="btnFecharConfig">Fechar</button>
    </div>
  </div>
</div>

<!-- RODAPÉ -->
<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<!-- SCRIPTS -->
<script type="module">
  import { checkAuth, getUser } from './js/auth.js'

  // Verifica login
  checkAuth()

  // Exibe usuário logado
  const user = getUser()
  document.getElementById("userInfo").innerText = "Usuário logado: " + user
    if (user === "ADM") {
  document.getElementById("btnConfig").classList.remove("hidden")
}

  
  // Ajusta título para incluir usuário
  const titulo = document.querySelector(".titulo small")
  if (titulo && user) {
    titulo.innerText = titulo.innerText + " | Usuário: " + user
  }

  
</script>

</body>
</html>
