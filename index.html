<!DOCTYPE html>
<html>
<head>
  <title>Consulta Estoque</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <div class="titulo">
    <strong>SEAL — Serviço de Almoxarifado</strong><br>
    <small>Localizador de Estoque · INI / Fiocruz</small>
  </div>
</div>

<!-- BARRA DE BUSCA -->
<div class="barra-topo">
  <input type="text" id="busca" placeholder="Pesquisar por código, nome ou endereço">
  <button id="btnBuscar">Buscar</button>
  <button id="btnNovo">+ Novo Item</button>

  <span id="totalItens" class="contador">0 itens no estoque</span>
</div>

<!-- TABELA -->
<table>
  <thead>
    <tr>
      <th>Código</th>
      <th>Nome</th>
      <th>Externo</th>
      <th>Satélite</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<!-- RODAPÉ -->
<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a> — INI / Fiocruz |
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Novo Item</h3>

    <input id="codigo" placeholder="Código">
    <input id="nome" placeholder="Nome do item">
    <input id="externo" placeholder="Endereço externo">
    <input id="satelite" placeholder="Endereço satélite">
    <input id="observacao" placeholder="Observação">

    <select id="liberacao">
      <option value="LIVRE">LIVRE</option>
      <option value="SOMENTE NO EXTERNO">SOMENTE NO EXTERNO</option>
      <option value="SOMENTE NO SATELITE">SOMENTE NO SATELITE</option>
      <option value="INATIVO">INATIVO</option>
    </select>

    <div class="modal-actions">
      <button id="btnCancelar">Cancelar</button>
      <button id="btnSalvar">Salvar</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
