<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEAL - Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
</head>

<body>

<header class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo" alt="Logo SEAL">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Login</small>
    </div>
  </div>
</header>

<main class="conteudo">
  <div class="login-box">
    <img src="../img/login.svg" alt="Login" class="login-img">
    <h2>Acesso ao Sistema</h2>
      <form id="formLogin">
        <input type="text" id="usuario" placeholder="Usuário" required>
        <input type="password" id="senha" placeholder="Senha" required oninput="this.value = this.value.toUpperCase()">
        <button type="submit">Entrar</button>
      </form>
  </div>
</main>

<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<!-- Scripts -->
<script type="module" src="../js/auth.js"></script>

</body>
</html>
