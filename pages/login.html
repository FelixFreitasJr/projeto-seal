<!DOCTYPE html>
<html>
<head>
  <title>SEAL - Login</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/x-icon" href="../img/favicon.svg">

  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
</head>

<body>

<div class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Acesso ao Sistema</small>
    </div>
  </div>
</div>

<div class="conteudo">
  <div class="login-box">
    <div style="text-align:center;">
      <img src="../img/login.svg" style="width:80px;">
      <h2>Acesso</h2>
    </div>

    <input id="usuario" placeholder="Usuário" oninput="this.value = this.value.toUpperCase()">
    <input id="senha" type="password" placeholder="Senha" 
           oninput="this.value = this.value.toUpperCase()" 
           onkeypress="if(event.key==='Enter') login()">

    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- RODAPÉ -->
<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<!-- SCRIPTS -->
<script type="module">
  import { login } from '../js/auth.js'
  // expõe login no escopo global para funcionar com onclick
  window.login = login
</script>

</body>
</html>
