<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEAL - Dispensa</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
</head>

<body>

<header class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo" alt="Logo SEAL">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Dispensa de Máscara PFF/N95</small>
    </div>
  </div>

  <div class="topo-direita">
    <nav class="menu-principal">
      <button onclick="window.location.href='../index.html'">Dashboard</button>
      <button onclick="window.location.href='estoque.html'">Estoque</button>
      <button onclick="window.location.href='dispensa.html'">Dispensa</button>
      <button id="btnPedidos" class="hidden" onclick="window.location.href='pedidos.html'">Pedidos</button>
      <button id="btnConfig" class="hidden" aria-label="Configurações">⚙️</button>
      <button onclick="logout()">Sair</button>
    </nav>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
  </div>
</header>

<div class="barra-topo">
  <div class="busca-box">
    <input id="busca" placeholder="Buscar por CPF (6 dígitos), nome, empresa ou função...">
    <span id="limparBusca" class="limpar">✖</span>
  </div>

  <button id="btnNovoColaborador">
    <img src="../img/novo.svg" alt="Novo"> Novo Colaborador
  </button>
  <span id="contadorColaboradores"></span>
</div>

<main class="conteudo">
  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th>CPF</th>
          <th>Nome</th>
          <th>Empresa</th>
          <th>Função</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>
</main>

<!-- Modal novo colaborador -->
<div id="modalColaborador" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Novo Colaborador</h3>

    <input id="cpf" placeholder="CPF (somente números)" maxlength="14">
    <input id="nome" placeholder="Nome">
    <input id="empresa" placeholder="Empresa">
    <input id="funcao" placeholder="Função">

    <div class="modal-actions">
      <button id="btnCancelarColaborador">
        <img src="../img/excluir.svg" alt="Cancelar"> Cancelar
      </button>
      <button id="btnSalvarColaborador">
        <img src="../img/salvar.svg" alt="Salvar"> Salvar
      </button>
    </div>
  </div>
</div>

<!-- Modal configuração -->
<div id="modalConfig" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Gerenciar Usuários</h3>
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios"></tbody>
    </table>
    <div class="modal-actions">
      <button id="btnFecharConfig">Fechar</button>
    </div>
  </div>
</div>

<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<script type="module" src="../js/app.js"></script>
<script type="module">
  import { checkAuth, getUser } from '../js/auth.js'

  // Verifica login
  checkAuth()

  const user = getUser()

  // Exibe usuário logado (se existir o elemento)
  const userInfo = document.getElementById("userInfo")
  if (userInfo && user) {
    userInfo.innerText = "Usuário logado: " + user
  }

  // Aqui você pode adicionar a máscara do CPF
  const cpfInput = document.getElementById("cpf")
  if (cpfInput) {
    cpfInput.addEventListener("input", () => {
      let valor = cpfInput.value.replace(/\D/g, "")
      if (valor.length > 11) valor = valor.slice(0, 11)
      cpfInput.value = formatarCPF(valor)
    })

    cpfInput.addEventListener("blur", () => {
      const valor = cpfInput.value.replace(/\D/g, "")
      if (!validarCPF(valor)) {
        alert("CPF inválido. Verifique e corrija antes de salvar.")
        cpfInput.focus()
      }
    })
  }

  // Funções de apoio
  function formatarCPF(cpf) {
    return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4")
  }

  function validarCPF(cpf) {
    if (!cpf || cpf.length !== 11) return false
    if (/^(\d)\1+$/.test(cpf)) return false
    return true
  }
</script>


</body>
</html>
