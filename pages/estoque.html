<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEAL - Estoque</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/svg+xml" href="../img/favicon.svg">
</head>

<body>

<header class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo" alt="Logo SEAL">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Controle de Estoque</small>
    </div>
  </div>

  <div class="topo-direita">
    <nav class="menu-principal">
      <button onclick="window.location.href='../index.html'">Dashboard</button>
      <button onclick="window.location.href='estoque.html'">Estoque</button>
      <button onclick="window.location.href='dispensa.html'">Dispensa</button>
      <button id="btnPedidos" class="hidden" onclick="window.location.href='pedidos.html'">Pedidos</button>
      <button id="btnConfig" class="hidden" aria-label="Configurações">⚙️</button>
      <button onclick="logout()">Sair</button>
    </nav>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
  </div>
</header>

<div class="barra-topo">
  <div class="busca-box">
    <input id="busca" placeholder="Buscar por código, nome, observação ou status...">
    <span id="limparBusca" class="limpar">✖</span>
  </div>

  <button id="btnNovo">
    <img src="../img/novo.svg" alt="Novo"> Novo Item
  </button>
  <span id="contadorEstoque"></span>
</div>

<main class="conteudo">
  <div class="tabela-container">
    <table>
      <thead>
        <tr>
          <th onclick="ordenarTabela('produtos','codigo')">Código MV</th>
          <th class="col-sga" onclick="ordenarTabela('produtos','codigo_sga')">Código SGA</th>
          <th onclick="ordenarTabela('produtos','nome')">Nome</th>
          <th onclick="ordenarTabela('produtos','endereco_externo')">Externo</th>
          <th onclick="ordenarTabela('produtos','endereco_satelite')">Satélite</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tabelaEstoque"></tbody>
    </table>
  </div>
</main>

<!-- Modal novo item -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Novo Item</h3>

    <input id="codigo_mv" placeholder="Código MV">
    <input id="codigo_sga" class="col-sga" placeholder="Código SGA">
    <input id="nome" placeholder="Nome">
    <input id="externo" placeholder="Endereço Externo">
    <input id="satelite" placeholder="Endereço Satélite">
    <input id="observacao" placeholder="Observação">
    <select id="liberacao">
      <option value="Livre">Livre</option>
      <option value="Somente no externo">Somente no externo</option>
      <option value="Somente no satélite">Somente no satélite</option>
      <option value="Somente CME">Somente CME</option>
      <option value="Sob supervisão">Sob supervisão</option>
      <option value="Somente paciente">Somente paciente</option>
      <option value="Inativo">Inativo</option>
    </select>

    <div class="modal-actions">
      <button id="btnCancelar">
        <img src="../img/excluir.svg" alt="Cancelar"> Cancelar
      </button>
      <button id="btnSalvar">
        <img src="../img/salvar.svg" alt="Salvar"> Salvar
      </button>
    </div>
  </div>
</div>

<!-- Modal configuração -->
<div id="modalConfig" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modal-content">
    <h3>Gerenciar Usuários</h3>
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios"></tbody>
    </table>
    <div class="modal-actions">
      <button id="btnFecharConfig">Fechar</button>
    </div>
  </div>
</div>

<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<script type="module" src="../js/app.js"></script>
<script type="module">
  import { checkAuth, getUser } from '../js/auth.js'  

  checkAuth()

  const user = JSON.parse(localStorage.getItem("usuarioLogado"))
  const userInfo = document.getElementById("userInfo")
  if (userInfo && user) {
    userInfo.innerText = "Usuário logado: " + user.usuario
  }

  // Exibe coluna SGA apenas para ADM
  if (user.perfil !== "ADM") {
    document.querySelectorAll(".col-sga").forEach(el => el.style.display = "none")
  }

  document.addEventListener("DOMContentLoaded", () => {
    atualizarEstoque()
  })
</script>


</body>
</html>
