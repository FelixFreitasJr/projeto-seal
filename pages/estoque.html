<!DOCTYPE html>
<html>
<head>
  <title>SEAL - Estoque</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Controle de Estoque</small>
    </div>
  </div>

  <div class="topo-direita">
    <button onclick="window.location.href='../index.html'">Dashboard</button>
    <button onclick="window.location.href='estoque.html'">Estoque</button>
    <button onclick="window.location.href='dispensa.html'">Dispensa</button>
    <button id="btnConfig" class="hidden">⚙️</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<!-- BARRA -->
<div class="barra-topo">
  <div class="busca-box">
    <input id="busca" placeholder="Buscar por código, nome, observação ou status...">
    <span id="limparBusca" class="limpar">✖</span>
  </div>

  <button id="btnNovo">
    <img src="../img/novo.svg"> Novo Item
  </button>
  <span id="contadorEstoque"></span>
</div>

<!-- TABELA -->
<div class="conteudo">
  <table>
    <thead>
      <tr>
        <th onclick="ordenarTabela('produtos','codigo')">Código</th>
        <th onclick="ordenarTabela('produtos','nome')">Nome</th>
        <th onclick="ordenarTabela('produtos', 'endereco_externo')">Externo</th>
        <th onclick="ordenarTabela('produtos','endereco_satelite')">Satélite</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
    <tbody id="tabelaEstoque"></tbody>
  </table>
  <p id="userInfo"></p>
</div>

<!-- MODAL NOVO ITEM -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h3>Novo Item</h3>

    <input id="codigo" placeholder="Código">
    <input id="nome" placeholder="Nome">
    <input id="externo" placeholder="Endereço Externo">
    <input id="satelite" placeholder="Endereço Satélite">
    <input id="observacao" placeholder="Observação">
    <input id="liberacao" placeholder="Liberação">

    <div class="modal-actions">
      <button id="btnCancelar">
        <img src="../img/excluir.svg"> Cancelar
      </button>
      <button id="btnSalvar">
        <img src="../img/salvar.svg"> Salvar
      </button>
    </div>
  </div>
</div>

<!-- MODAL CONFIGURAÇÃO -->
<div id="modalConfig" class="modal hidden">
  <div class="modal-content">
    <h3>Gerenciar Usuários</h3>
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Perfil</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabelaUsuarios"></tbody>
    </table>
    <div class="modal-actions">
      <button id="btnFecharConfig">Fechar</button>
    </div>
  </div>
</div>

<!-- RODAPÉ -->
<footer class="rodape">
  Desenvolvido por 
  <a href="https://github.com/FelixFreitasJr" target="_blank">Felix Freitas Jr</a><br>
  <a href="https://github.com/FelixFreitasJr/projeto-seal" target="_blank">Documentação</a>
</footer>

<!-- SCRIPTS -->
<script type="module" src="../js/app.js"></script>
<script type="module">
  import { checkAuth, getUser } from '../js/auth.js'  <!-- ajuste o caminho conforme a pasta -->

  // Verifica login
  checkAuth()

  // Exibe usuário logado (se existir o elemento)
  const user = getUser()
  const userInfo = document.getElementById("userInfo")
  if (userInfo && user) {
    userInfo.innerText = "Usuário logado: " + user
  }

  // Ajusta título para incluir usuário
  const titulo = document.querySelector(".titulo small")
  if (titulo && user) {
    titulo.innerText = titulo.innerText + " | Usuário: " + user
  }

  // Mostrar botão de config apenas para ADM
  if (user === "ADM") {
    document.getElementById("btnConfig")?.classList.remove("hidden")
  }
</script>


</body>
</html>
