<!DOCTYPE html>
<html>
<head>
  <title>SEAL - Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">

  <script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
  <script type="module" src="../js/auth.js"></script>
  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/modules/pedidos.js"></script>

  <link rel="icon" type="image/x-icon" href="../img/favicon.svg">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="topo-esquerda">
    <img src="../img/logo.png" class="logo">
    <div class="titulo">
      <strong>SEAL — Serviço de Almoxarifado - INI / Fiocruz</strong><br>
      <small>Pedidos</small>
    </div>
  </div>

  <div class="topo-direita">
    <button onclick="window.location.href='../index.html'">Dashboard</button>
    <button onclick="window.location.href='estoque.html'">Estoque</button>
    <button onclick="window.location.href='dispensa.html'">Dispensa</button>
    <button id="btnPedidos" class="hidden" onclick="window.location.href='pedidos.html'">Pedidos</button>
    <button id="btnConfig" class="hidden">⚙️</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>


<div class="conteudo">
<div id="areaPedidos">
  <!-- Parte 1: Formulário -->
  <div class="formulario-pedido">
    <input id="codigo" placeholder="Código MV ou SGA" oninput="previewCodigo(this.value)">
    <div id="previewItem"></div>
    <input id="quantidade" type="number" placeholder="Quantidade">
    <button id="btnIncluir">Incluir</button>
  </div>

  <!-- Parte 2: Lista de pedidos -->
  <h3>Itens do Pedido</h3>
  <table>
    <thead>
      <tr>
        <th>Código</th>
        <th>Nome</th>
        <th>Quantidade</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="listaPedidos"></tbody>
  </table>

  <!-- Finalizar -->
  <button id="btnFinalizar">Finalizar Pedido</button>
  <button id="btnPDF">Exportar PDF</button>
</div>

</div>

<script type="module" src="../js/app.js"></script>
<script type="module">
  import { checkAuth, getUser } from '../js/auth.js'

  // Verifica login
  checkAuth()

  // Exibe usuário logado (se existir o elemento)
  const user = getUser()
  const userInfo = document.getElementById("userInfo")
  if (userInfo && user) {
    userInfo.innerText = "Usuário logado: " + user
  }

  // Mostrar botão de config apenas para ADM
  if (user === "ADM") {
    document.getElementById("btnConfig").classList.remove("hidden")
  }
</script>
</body>
</html>
